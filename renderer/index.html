<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>flowgraph · prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0a0b0d;
    --bg-grid:      #131418;
    --bg-grid-lg:   #1a1c22;
    --panel:        #0f1115;
    --panel-hi:     #15181e;
    --line:         #24272f;
    --line-hi:      #3a3f4b;
    --text:         #d8dbe2;
    --text-dim:     #7a7f8c;
    --text-mute:    #4a4e59;
    --accent:       #e6e8ec;
    --sel:          #ffffff;
    --danger:       #ff5a5f;
    --ok:           #6ee7a8;
    --warn:         #ffcb6b;

    /* flow hues — kept tightly chromatic, low-sat so overlaps don't muddy */
    --f0: 200 80% 60%;   /* cyan-blue */
    --f1: 30  90% 62%;   /* amber */
    --f2: 330 75% 65%;   /* magenta */
    --f3: 150 60% 58%;   /* mint */
    --f4: 260 70% 70%;   /* violet */
    --f5: 0   75% 65%;   /* coral */

    --node-size: 72px;
    --node-radius: 4px;
    --port-size: 9px;
  }

  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; overflow:hidden; background:var(--bg); }
  body {
    font-family: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, monospace;
    color: var(--text);
    font-size: 12px;
    line-height: 1.35;
    user-select: none;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- top bar ---------- */
  .topbar {
    position: fixed; top:0; left:0; right:0; height: 32px;
    display: flex; align-items: center; gap: 18px;
    padding: 0 12px;
    /* macOS: leave room for traffic-light buttons when titleBarStyle=hiddenInset */
    padding-left: max(12px, env(titlebar-area-x, 80px));
    background: linear-gradient(180deg, #0d0e12 0%, #0a0b0d 100%);
    border-bottom: 1px solid var(--line);
    z-index: 100;
    font-size: 11px;
    -webkit-app-region: drag;  /* makes the bar a native window-drag handle */
  }
  /* buttons and interactive elements inside the draggable bar must opt out */
  .topbar button, .topbar .tb-btn, .topbar input, .topbar select {
    -webkit-app-region: no-drag;
  }
  .topbar .brand {
    letter-spacing: 0.18em; font-weight: 600; color: var(--text);
    text-transform: uppercase;
  }
  .topbar .brand::before {
    content: "◆"; color: var(--ok); margin-right: 6px; font-size: 9px;
    vertical-align: 1px;
  }
  .topbar .sep {
    width:1px; height:14px; background: var(--line);
  }
  .topbar .meta { color: var(--text-dim); }
  .topbar .meta b { color: var(--text); font-weight: 500; }
  .topbar .spacer { flex: 1; }
  .topbar .hint { color: var(--text-mute); }
  .topbar .hint kbd {
    font-family: inherit; font-size: 10px;
    background: var(--panel-hi);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 1px 5px;
    color: var(--text-dim);
    margin: 0 2px;
  }

  /* toolbar buttons */
  .tb-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 3px 8px 3px 6px;
    cursor: pointer;
    transition: color 0.08s ease, border-color 0.08s ease, background 0.08s ease;
  }
  .tb-btn:hover { color: var(--text); border-color: var(--line-hi); }
  .tb-btn.on {
    color: var(--bg);
    background: var(--text);
    border-color: var(--text);
  }
  .tb-btn .tb-icon {
    display: inline-flex; flex-direction: column; gap: 1px;
    width: 10px;
  }
  .tb-btn .tb-icon span {
    display: block;
    height: 2px;
    background: currentColor;
    border-radius: 1px;
  }
  .tb-btn .tb-icon span:nth-child(1) { width: 10px; }
  .tb-btn .tb-icon span:nth-child(2) { width: 7px; }
  .tb-btn .tb-icon span:nth-child(3) { width: 4px; }

  /* view-spec dot buttons */
  .view-btns {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    -webkit-app-region: no-drag;
  }
  .view-btns.hidden { display: none !important; }
  .view-dot {
    width: 18px; height: 18px;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: inherit;
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.06em;
    color: var(--text-mute);
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 3px;
    cursor: pointer;
    padding: 0;
    transition: color 0.08s, border-color 0.08s, background 0.08s;
  }
  .view-dot:hover { color: var(--text-dim); border-color: var(--line-hi); }
  .view-dot.active { color: var(--bg); background: var(--text); border-color: var(--text); }

  /* brief transition during layout mode switch */
  .world.layout-anim .node {
    transition: left 0.24s cubic-bezier(.4,.0,.2,1), top 0.24s cubic-bezier(.4,.0,.2,1);
  }

  /* ---------- canvas ---------- */
  .canvas {
    position: absolute; inset: 32px 0 22px 0;
    overflow: hidden;
    cursor: grab;
    background:
      radial-gradient(ellipse at 50% 30%, #101217 0%, var(--bg) 70%);
    touch-action: none;
    -webkit-touch-callout: none;
  }
  .canvas.panning { cursor: grabbing; }
  .canvas.connecting { cursor: crosshair; }

  .world {
    position: absolute; left: 0; top: 0;
    transform-origin: 0 0;
    will-change: transform;
  }

  /* grid — two-level, faint */
  .grid {
    position: absolute; inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(var(--bg-grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid) 1px, transparent 1px),
      linear-gradient(var(--bg-grid-lg) 1px, transparent 1px),
      linear-gradient(90deg, var(--bg-grid-lg) 1px, transparent 1px);
    background-size: 20px 20px, 20px 20px, 100px 100px, 100px 100px;
    background-position: -1px -1px;
    opacity: 0.6;
  }

  /* edges svg fills the world */
  svg.edges {
    position: absolute; left: 0; top: 0;
    overflow: visible;
    pointer-events: none;
  }
  svg.edges path.edge {
    fill: none;
    stroke-width: 1.5;
    pointer-events: stroke;
    cursor: pointer;
    transition: stroke-width 0.08s ease;
  }
  svg.edges path.edge-hit {
    fill: none;
    stroke: transparent;
    stroke-width: 10;
    pointer-events: stroke;
    cursor: pointer;
  }
  svg.edges path.edge:hover { stroke-width: 2.5; }
  svg.edges path.edge.selected { stroke-width: 2.5; filter: drop-shadow(0 0 4px currentColor); }
  svg.edges path.ghost {
    fill: none;
    stroke: var(--text-dim);
    stroke-width: 1.5;
    stroke-dasharray: 3 3;
    pointer-events: none;
  }

  /* ---------- node ---------- */
  .node {
    position: absolute;
    width: var(--node-size);
    height: var(--node-size);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--node-radius);
    display: flex; flex-direction: column;
    cursor: grab;
    transition: border-color 0.08s ease, box-shadow 0.08s ease, transform 0.08s ease;
    will-change: transform;
    touch-action: none;
  }
  .node:hover { border-color: var(--line-hi); }
  .node.selected {
    border-color: var(--sel);
    box-shadow: 0 0 0 1px var(--sel), 0 4px 16px rgba(0,0,0,0.5);
    z-index: 5;
  }
  .node.dragging { cursor: grabbing; z-index: 10; }

  /* Stacked: nodes that share space with others. Each card inherits
     --stack-offset that shifts it on a diagonal, and layered shadows
     hint at depth behind the topmost card. */
  .node.stacked {
    transform: translate(var(--stack-offset, 0), var(--stack-offset, 0));
    box-shadow:
      -3px -3px 0 -1px var(--panel),
      -3px -3px 0 0 var(--line),
      -6px -6px 0 -1px var(--panel),
      -6px -6px 0 0 var(--line),
      0 4px 12px rgba(0,0,0,0.4);
  }
  .node.stacked.selected {
    box-shadow:
      -3px -3px 0 -1px var(--panel),
      -3px -3px 0 0 var(--line),
      -6px -6px 0 -1px var(--panel),
      -6px -6px 0 0 var(--line),
      0 0 0 1px var(--sel),
      0 4px 16px rgba(0,0,0,0.5);
  }
  .node .stack-badge {
    position: absolute;
    top: -7px; right: -7px;
    min-width: 16px; height: 16px;
    padding: 0 4px;
    background: var(--text);
    color: var(--bg);
    font-size: 9px;
    font-weight: 700;
    line-height: 16px;
    text-align: center;
    border-radius: 8px;
    box-shadow: 0 0 0 2px var(--bg);
    pointer-events: none;
  }

  /* flow highlight: when a node is selected, dim everything not in its flow */
  .world.flow-highlight .node {
    opacity: 0.12;
    filter: saturate(0.15) brightness(0.7);
    transition: opacity 0.18s ease, filter 0.18s ease;
  }
  .world.flow-highlight .node.in-flow {
    opacity: 1;
    filter: none;
  }
  .world.flow-highlight .node.selected {
    opacity: 1;
    filter: none;
  }
  /* When highlight first activates, briefly pulse the in-flow nodes
     so the change is unmistakable. */
  .world.flow-highlight.flash .node.in-flow {
    animation: flowFlash 0.45s ease;
  }
  @keyframes flowFlash {
    0%   { box-shadow: 0 0 0 0 hsl(var(--flow) / 0); }
    40%  { box-shadow: 0 0 0 4px hsl(var(--flow) / 0.5); }
    100% { box-shadow: 0 0 0 0 hsl(var(--flow) / 0); }
  }
  svg.edges path.edge.dim {
    opacity: 0.06 !important;
    transition: opacity 0.18s ease;
  }

  /* flow color stripe on left edge */
  .node::before {
    content: "";
    position: absolute;
    left: -1px; top: -1px; bottom: -1px;
    width: 2px;
    background: hsl(var(--flow));
    border-radius: 2px 0 0 2px;
  }

  .node-head {
    display: flex; align-items: center; gap: 4px;
    padding: 3px 5px 2px 5px;
    border-bottom: 1px solid var(--line);
    font-size: 8px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    line-height: 1;
  }
  .node-head .type {
    font-weight: 600;
    color: hsl(var(--flow));
  }
  .node-head .id {
    color: var(--text-mute);
    margin-left: 2px;
    font-size: 8px;
  }
  .node-head .enabled-dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--text);
    margin-left: auto;
    box-shadow: 0 0 3px var(--text);
  }
  .node-head .enabled-dot.off {
    background: transparent;
    border: 1px solid var(--text-mute);
    box-shadow: none;
  }
  .node-head .status {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--text-mute);
    margin-left: 3px;
  }
  .node-head .status.ok { background: var(--ok); box-shadow: 0 0 4px hsl(150 60% 58% / 0.6); }
  .node-head .status.warn { background: var(--warn); }
  .node-head .status.run { background: var(--f0); animation: pulse 1.2s infinite; }
  @keyframes pulse { 50% { opacity: 0.3; } }

  .node-title {
    flex: 1;
    padding: 4px 6px 3px 6px;
    font-size: 10.5px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    word-break: break-word;
  }

  .node-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding: 2px 5px 3px 5px;
    font-size: 8px;
    color: var(--text-mute);
    letter-spacing: 0.04em;
    border-top: 1px solid var(--line);
    line-height: 1;
  }

  /* disabled node: desaturated + dashed flow stripe */
  .node.disabled { opacity: 0.55; }
  .node.disabled::before {
    background: repeating-linear-gradient(
      180deg,
      hsl(var(--flow)) 0 3px,
      transparent 3px 6px
    );
  }
  .node.disabled .node-title { color: var(--text-dim); text-decoration: line-through; text-decoration-color: var(--text-mute); text-decoration-thickness: 1px; }

  /* ports */
  .port {
    position: absolute;
    width: var(--port-size);
    height: var(--port-size);
    background: var(--panel);
    border: 1px solid var(--line-hi);
    border-radius: 50%;
    cursor: crosshair;
    z-index: 2;
    transition: transform 0.08s ease, border-color 0.08s ease, background 0.08s ease;
    touch-action: none;
  }
  /* invisible larger hit area for touch */
  .port::after {
    content: "";
    position: absolute;
    inset: -10px;
    border-radius: 50%;
  }

  /* touch devices: slightly bigger visible port for finger targeting */
  @media (pointer: coarse) {
    :root { --port-size: 12px; }
    .port::after { inset: -14px; }
  }
  .port:hover {
    transform: scale(1.4);
    border-color: var(--sel);
    background: hsl(var(--flow));
  }
  .port.in {
    left: calc(var(--port-size) / -2 - 0.5px);
    top: 50%;
    transform: translateY(-50%);
  }
  .port.in:hover { transform: translateY(-50%) scale(1.4); }
  .port.out {
    right: calc(var(--port-size) / -2 - 0.5px);
    top: 50%;
    transform: translateY(-50%);
    background: hsl(var(--flow) / 0.2);
    border-color: hsl(var(--flow) / 0.8);
  }
  .port.out:hover { transform: translateY(-50%) scale(1.4); background: hsl(var(--flow)); }

  /* ---------- inspector (expanded node as floating overlay) ---------- */
  .inspector-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(5, 6, 8, 0.55);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    z-index: 190;
    animation: fadeIn 0.12s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } }

  .inspector {
    position: fixed;
    width: 440px;
    max-width: calc(100vw - 32px);
    max-height: 75vh;
    background: rgba(15,17,21,0.98);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--line-hi);
    border-radius: 6px;
    box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.03);
    z-index: 200;
    display: flex; flex-direction: column;
    overflow: hidden;
    animation: pop 0.14s ease;
    /* centered by default */
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
  }
  @keyframes pop {
    from { opacity: 0; transform: translate(-50%, -50%) scale(0.96); }
    to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  }

  @media (max-width: 560px) {
    .inspector { width: calc(100vw - 24px); }
  }

  .inspector-head {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 10px;
    border-bottom: 1px solid var(--line);
    background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
  }
  .inspector-head .tag {
    font-size: 9px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: hsl(var(--flow));
    padding: 2px 5px;
    border: 1px solid hsl(var(--flow) / 0.4);
    border-radius: 2px;
  }
  .inspector-head input.title {
    flex: 1;
    background: transparent;
    border: none; outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    padding: 2px 0;
  }
  .inspector-head .close {
    color: var(--text-dim);
    cursor: pointer;
    padding: 2px 6px;
    font-size: 14px;
    line-height: 1;
  }
  .inspector-head .close:hover { color: var(--text); }

  /* on/off toggle */
  .inspector-head .toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 2px 6px 2px 3px;
    border-radius: 10px;
    cursor: pointer;
    transition: color 0.1s ease, border-color 0.1s ease, background 0.1s ease;
  }
  .inspector-head .toggle:hover { border-color: var(--line-hi); color: var(--text); }
  .inspector-head .toggle .track {
    position: relative;
    display: inline-block;
    width: 18px; height: 10px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 6px;
    transition: background 0.14s ease, border-color 0.14s ease;
  }
  .inspector-head .toggle .knob {
    position: absolute;
    top: 1px; left: 1px;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-mute);
    transition: left 0.14s ease, background 0.14s ease;
  }
  .inspector-head .toggle.on {
    color: hsl(var(--flow));
    border-color: hsl(var(--flow) / 0.5);
  }
  .inspector-head .toggle.on .track {
    background: hsl(var(--flow) / 0.2);
    border-color: hsl(var(--flow) / 0.6);
  }
  .inspector-head .toggle.on .knob {
    left: 9px;
    background: hsl(var(--flow));
    box-shadow: 0 0 4px hsl(var(--flow) / 0.6);
  }

  .inspector-body {
    padding: 10px;
    overflow-y: auto;
    flex: 1;
  }
  .field {
    margin-bottom: 10px;
  }
  .field label {
    display: block;
    font-size: 9px; letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-mute);
    margin-bottom: 4px;
  }
  .field textarea, .field input, .field select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 6px 8px;
    border-radius: 3px;
    outline: none;
    resize: vertical;
  }
  .field textarea:focus, .field input:focus, .field select:focus { border-color: var(--line-hi); }
  .field textarea { min-height: 90px; font-size: 11px; line-height: 1.5; }

  .upstream {
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 6px 8px;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--bg);
  }
  .upstream .row { display: flex; align-items: center; gap: 6px; padding: 2px 0; }
  .upstream .dot { width:6px; height:6px; border-radius: 50%; }
  .upstream .row b { color: var(--text); font-weight: 500; }
  .upstream .row span { color: var(--text-mute); margin-left: auto; font-size: 9px; }
  .upstream .none { color: var(--text-mute); font-style: italic; }

  .inspector-foot {
    display: flex; gap: 6px; padding: 8px 10px;
    border-top: 1px solid var(--line);
    background: var(--panel);
    font-size: 10px;
  }
  .inspector-foot .key {
    color: var(--text-mute);
  }
  .inspector-foot .key kbd {
    font-family: inherit;
    background: var(--bg);
    border: 1px solid var(--line);
    padding: 1px 4px;
    border-radius: 2px;
    color: var(--text-dim);
    margin: 0 1px;
  }

  /* ---------- status bar ---------- */
  .statusbar {
    position: fixed; bottom: 0; left: 0; right: 0; height: 22px;
    background: #0c0d11;
    border-top: 1px solid var(--line);
    display: flex; align-items: center;
    padding: 0 10px;
    font-size: 10px;
    color: var(--text-mute);
    letter-spacing: 0.04em;
    gap: 16px;
    z-index: 100;
  }
  .statusbar b { color: var(--text-dim); font-weight: 500; }
  .statusbar .spacer { flex: 1; }
  .statusbar .mode {
    color: var(--ok);
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
  .statusbar .mode.connect { color: var(--f1); }
  #view-indicator { color: var(--text-mute); letter-spacing: 0.1em; }
  #view-indicator.hidden { display: none; }

  /* ---------- palette (create menu) ---------- */
  .palette {
    position: fixed;
    background: rgba(15,17,21,0.98);
    backdrop-filter: blur(12px);
    border: 1px solid var(--line-hi);
    border-radius: 4px;
    padding: 4px;
    min-width: 180px;
    z-index: 300;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    animation: pop 0.1s ease;
  }
  .palette .item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 8px;
    cursor: pointer;
    font-size: 11px;
    border-radius: 2px;
  }
  .palette .item:hover, .palette .item.focus { background: var(--panel-hi); }
  .palette .item .type {
    font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-dim);
    margin-left: auto;
  }
  .palette .item .mark {
    width: 8px; height: 8px; border-radius: 1px;
  }

  /* ---------- command palette ---------- */
  .cmdpal-wrap {
    position: fixed; inset: 0;
    z-index: 600;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .cmdpal-wrap.cmdpal-open { pointer-events: auto; }
  .cmdpal-backdrop {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.45);
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .cmdpal-wrap.cmdpal-open .cmdpal-backdrop { opacity: 1; }
  .cmdpal {
    position: relative; z-index: 1;
    width: 520px; max-width: calc(100vw - 48px);
    background: rgba(12,13,16,0.97);
    border: 1px solid var(--line-hi);
    border-radius: 8px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.035);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    transform: scale(0.96) translateY(-8px); opacity: 0;
    transition: transform 0.16s cubic-bezier(.4,0,.2,1), opacity 0.16s ease;
    pointer-events: none;
  }
  .cmdpal-wrap.cmdpal-open .cmdpal {
    transform: scale(1) translateY(0); opacity: 1;
    pointer-events: auto;
  }
  .cmdpal-input {
    width: 100%; box-sizing: border-box;
    background: transparent; border: none; outline: none;
    color: var(--text); font-family: inherit;
    font-size: 15px; letter-spacing: 0.01em;
    padding: 18px 20px;
    caret-color: var(--ok);
  }
  .cmdpal-input::placeholder { color: var(--text-mute); }
  .cmdpal-hints {
    padding: 7px 20px 9px;
    border-top: 1px solid var(--line);
    font-size: 10px; color: var(--text-mute);
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .cmdpal-hints kbd {
    font-family: inherit; font-size: 10px;
    background: var(--panel-hi); border: 1px solid var(--line);
    border-radius: 2px; padding: 1px 5px;
    color: var(--text-dim); margin: 0 2px;
  }

  /* ---------- toast notifications ---------- */
  .toast-stack {
    position: fixed; bottom: 30px; right: 16px;
    display: flex; flex-direction: column;
    gap: 8px; align-items: flex-end;
    z-index: 610; pointer-events: none;
    max-width: 360px;
  }
  .toast {
    pointer-events: auto;
    background: rgba(12,13,16,0.96);
    border: 1px solid var(--line-hi);
    border-radius: 6px;
    padding: 9px 10px 9px 13px;
    font-size: 11px; line-height: 1.4; color: var(--text);
    display: flex; align-items: flex-start; gap: 8px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.55);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    max-width: 340px; min-width: 160px;
    transition: transform 0.22s cubic-bezier(.4,0,.2,1), opacity 0.22s ease;
  }
  .toast-up   { border-left: 2px solid var(--ok); }
  .toast-down { border-left: 2px solid var(--warn); }
  .toast-text { flex: 1; word-break: break-word; }
  .toast-close {
    flex-shrink: 0; background: transparent; border: none;
    color: var(--text-mute); cursor: pointer;
    font-family: inherit; font-size: 14px; line-height: 1;
    padding: 0 2px; margin-top: -1px;
  }
  .toast-close:hover { color: var(--text); }
</style>
</head>
<body>

  <span class="sep"></span>
  <span class="meta">graph · <b>untitled</b></span>
  <span class="meta" id="node-count">nodes: 0</span>
  <span class="meta" id="edge-count">edges: 0</span>
  <span class="sep"></span>
  <button class="tb-btn" id="auto-layout-btn" title="Auto-layout (a)">
    <span class="tb-icon">
      <span></span><span></span><span></span>
    </span>
    auto-layout
  </button>
  <span class="sep"></span>
  <span class="view-btns hidden" id="view-btns">

  </span>
  <span class="spacer"></span>
  <span class="hint">
    <kbd>h</kbd><kbd>j</kbd><kbd>k</kbd><kbd>l</kbd> nav ·
    <kbd>↵</kbd> select / expand ·
    <kbd>n</kbd> new ·
    <kbd>d</kbd> disable ·
    <kbd>a</kbd> layout ·
    <kbd>v</kbd> view ·
    <kbd>x</kbd> delete ·
    <kbd>esc</kbd> clear
  </span>
</div>

<div class="canvas" id="canvas">
  <div class="world" id="world">
    <div class="grid"></div>
