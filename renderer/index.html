    <!-- nodes injected here -->
  </div>
</div>

<div class="statusbar">
  <span class="mode" id="mode">NORMAL</span>
  <span><b id="sel-info">—</b></span>
  <span class="spacer"></span>
  <span id="zoom-info">100%</span>
  <span id="view-indicator" class="hidden">V1</span>
  <span id="pan-info">0, 0</span>
</div>

<!-- command palette -->
<div class="cmdpal-wrap" id="cmdpal-wrap">
  <div class="cmdpal-backdrop" id="cmdpal-backdrop"></div>
  <div class="cmdpal">
    <input
      id="cmdpal-input"
      class="cmdpal-input"
      type="text"
      placeholder="type something…"
      autocomplete="off"
      spellcheck="false"
    />
    <div class="cmdpal-hints">
      <span><kbd>shift</kbd><kbd>↵</kbd> send ↑</span>
      <span><kbd>⌘/ctrl</kbd><kbd>shift</kbd><kbd>↵</kbd> send ↓</span>
      <span><kbd>esc</kbd> clear · close</span>
      <span><kbd>⌘/ctrl</kbd><kbd>p</kbd> close</span>
    </div>
  </div>
</div>

<!-- toast notifications -->
<div class="toast-stack" id="toast-stack"></div>

<script>
(() => {
  'use strict';

  // ---------- state ----------
  const state = {
    nodes: new Map(),    // id -> node
    edges: new Map(),    // id -> edge
    nextNodeId: 1,
    nextEdgeId: 1,
    pan: { x: 120, y: 80 },
    zoom: 1,
    selected: null,     // node id
    selectedEdge: null, // edge id
    expanded: null,     // node id currently in inspector
    mode: 'normal',     // 'normal' | 'connect' | 'pan' | 'drag' | 'port-drag'
    draggingNode: null,
    dragOffset: { x: 0, y: 0 },
    portDrag: null,     // { fromNode, startX, startY, curX, curY }
    panStart: null,
    flowAssignments: new Map(), // rootId -> flow index
    nextFlow: 0,
    viewSpecs: [null, null, null], // one spec per slot; null = not yet initialised
    activeView: 0,
  };

  const NODE_SIZE = 72;
  const FLOW_COUNT = 6;

  // ---------- dom refs ----------
  const canvas = document.getElementById('canvas');
  const world = document.getElementById('world');
  const edgesSvg = document.getElementById('edges');
  const modeEl = document.getElementById('mode');
  const selInfoEl = document.getElementById('sel-info');
  const zoomInfoEl = document.getElementById('zoom-info');
  const panInfoEl = document.getElementById('pan-info');
  const nodeCountEl = document.getElementById('node-count');
  const edgeCountEl = document.getElementById('edge-count');
  const viewBtnsEl = document.getElementById('view-btns');
  const viewIndicatorEl = document.getElementById('view-indicator');

  // ---------- types ----------
  const NODE_TYPES = {
    script: {
      label: 'SCRIPT',
      defaultTitle: 'custom script',
      defaultConfig: { code: '// upstream inputs arrive as `inputs[]`\n// return the output value\nreturn inputs[0];', lang: 'js' },
      fields: [
        { key: 'lang', label: 'language', type: 'select', options: ['js', 'python', 'bash'] },
        { key: 'code', label: 'script body', type: 'textarea' },
      ],
    },
    lens: {
      label: 'LENS',
      defaultTitle: 'view/filter',
      defaultConfig: { op: 'filter', expr: 'item.value > 0', view: 'table' },
      fields: [
        { key: 'op', label: 'operation', type: 'select', options: ['filter', 'map', 'group', 'sort', 'tag', 'select'] },
        { key: 'expr', label: 'expression', type: 'textarea' },
        { key: 'view', label: 'render as', type: 'select', options: ['table', 'list', 'cards', 'json', 'raw'] },
      ],
    },
    camera: {
      label: 'CAMERA',
      defaultTitle: 'camera feed',
      defaultConfig: {
        source: 'default',
        resolution: '1280x720',
        fps: 30,
        mode: 'stream',
        trigger: 'continuous',
      },
      fields: [
        { key: 'source', label: 'device', type: 'select', options: ['default', 'webcam:0', 'webcam:1', 'rtsp', 'file', 'screen'] },
        { key: 'resolution', label: 'resolution', type: 'select', options: ['320x240', '640x480', '1280x720', '1920x1080', '3840x2160'] },
        { key: 'fps', label: 'fps', type: 'select', options: ['1', '5', '15', '30', '60'] },
        { key: 'mode', label: 'mode', type: 'select', options: ['stream', 'snapshot', 'motion', 'interval'] },
        { key: 'trigger', label: 'trigger', type: 'select', options: ['continuous', 'on-motion', 'on-signal', 'manual'] },
      ],
    },
  };

  // ---------- helpers ----------
  const uid = (p) => `${p}${state['next' + p[0].toUpperCase() + p.slice(1) + 'Id']++}`;
  const nodeId = () => `n${state.nextNodeId++}`;
  const edgeId = () => `e${state.nextEdgeId++}`;

  function worldFromScreen(sx, sy) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (sx - rect.left - state.pan.x) / state.zoom,
      y: (sy - rect.top - state.pan.y) / state.zoom,
    };
  }

  function screenFromWorld(wx, wy) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: wx * state.zoom + state.pan.x + rect.left,
      y: wy * state.zoom + state.pan.y + rect.top,
    };
  }

  function applyTransform() {
    world.style.transform = `translate(${state.pan.x}px, ${state.pan.y}px) scale(${state.zoom})`;
    panInfoEl.textContent = `${Math.round(state.pan.x)}, ${Math.round(state.pan.y)}`;
    zoomInfoEl.textContent = `${Math.round(state.zoom * 100)}%`;
  }

  function setMode(m) {
    state.mode = m;
    modeEl.textContent = m.toUpperCase();
    modeEl.className = 'mode' + (m === 'connect' ? ' connect' : '');
    canvas.classList.toggle('connecting', m === 'connect');
  }

  // ---------- pointer abstraction (mouse + touch) ----------
  // Returns {x, y} clientX/Y from a MouseEvent or the first Touch of a TouchEvent.
  function getPoint(e) {
    if (e.touches && e.touches.length) {
      return { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
    if (e.changedTouches && e.changedTouches.length) {
      return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
    }
    return { x: e.clientX, y: e.clientY };
  }

  // Attach a unified pointer-drag to an element.
  // handlers: { onStart(e, pt), onMove(e, pt), onEnd(e, pt) }
  // onStart may return false to cancel the drag.
  function onPointerDrag(el, handlers) {
    const begin = (e) => {
      // mouse: only primary button
      if (e.type === 'mousedown' && e.button !== 0 && e.button !== 1) return;
      // touch: only single-finger drags (multi-touch reserved for pinch)
      if (e.type === 'touchstart' && e.touches.length > 1) return;

      const pt = getPoint(e);
      const res = handlers.onStart ? handlers.onStart(e, pt) : undefined;
      if (res === false) return;

      const move = (ev) => {
        if (ev.type === 'touchmove' && ev.touches.length > 1) return; // let pinch handler take over
        const p = getPoint(ev);
        if (handlers.onMove) handlers.onMove(ev, p);
        if (ev.cancelable) ev.preventDefault();
      };
      const end = (ev) => {
        document.removeEventListener('mousemove', move);
        document.removeEventListener('mouseup', end);
        document.removeEventListener('touchmove', move);
        document.removeEventListener('touchend', end);
        document.removeEventListener('touchcancel', end);
        const p = getPoint(ev);
        if (handlers.onEnd) handlers.onEnd(ev, p);
      };
      document.addEventListener('mousemove', move);
      document.addEventListener('mouseup', end);
      document.addEventListener('touchmove', move, { passive: false });
      document.addEventListener('touchend', end);
      document.addEventListener('touchcancel', end);
    };
    el.addEventListener('mousedown', begin);
    el.addEventListener('touchstart', begin, { passive: false });
  }

  // Given a screen point, find the node DOM element under it.
  // On touch, elementFromPoint works during touchend via changedTouches coords.
  function nodeElAtPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    return el && el.closest ? el.closest('.node') : null;
  }

  function updateCounts() {
    nodeCountEl.textContent = `nodes: ${state.nodes.size}`;
    edgeCountEl.textContent = `edges: ${state.edges.size}`;
  }

  // ---------- flow coloring ----------
  // Assign each connected-component / root-chain a flow hue.
  // When a node has multiple parents, it takes the min flow index.
  function recomputeFlows() {
    state.flowAssignments.clear();
    const nodes = [...state.nodes.values()];
    // find roots (no incoming)
    const incoming = new Map();
    nodes.forEach(n => incoming.set(n.id, 0));
    state.edges.forEach(e => incoming.set(e.to, (incoming.get(e.to) || 0) + 1));
    const roots = nodes.filter(n => incoming.get(n.id) === 0);

    let flowIdx = 0;
    roots.forEach(r => {
      state.flowAssignments.set(r.id, flowIdx % FLOW_COUNT);
      flowIdx++;
    });
    // propagate down via BFS, keeping min flow
    const nodeFlow = new Map();
    roots.forEach(r => nodeFlow.set(r.id, state.flowAssignments.get(r.id)));
    let changed = true;
    while (changed) {
      changed = false;
      state.edges.forEach(e => {
        const fromF = nodeFlow.get(e.from);
        if (fromF === undefined) return;
        const curT = nodeFlow.get(e.to);
        if (curT === undefined || fromF < curT) {
          nodeFlow.set(e.to, fromF);
          changed = true;
        }
      });
    }
    // orphans (cycles, shouldn't happen in DAG, or disconnected)
    nodes.forEach(n => {
      if (!nodeFlow.has(n.id)) {
        nodeFlow.set(n.id, flowIdx % FLOW_COUNT);
        flowIdx++;
      }
    });
    nodes.forEach(n => { n.flow = nodeFlow.get(n.id); });
  }

  // ---------- nodes ----------
  function createNode(type, x, y, opts = {}) {
    const id = nodeId();
    const typeSpec = NODE_TYPES[type];
    const node = {
      id,
      type,
      x, y,
      title: opts.title || typeSpec.defaultTitle,
      config: { ...typeSpec.defaultConfig, ...(opts.config || {}) },
      status: opts.status || 'idle',
      enabled: opts.enabled !== false,
      flow: 0,
    };
    state.nodes.set(id, node);
    renderNode(node);
    recomputeFlows();
    refreshAllNodeStyles();
    updateCounts();
    maybeReflow();
    return node;
  }

  function renderNode(node) {
    const el = document.createElement('div');
    el.className = 'node' + (node.enabled === false ? ' disabled' : '');
    el.id = node.id;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    el.style.setProperty('--flow', `var(--f${node.flow})`);
    el.dataset.id = node.id;

    const statusClass =
      node.status === 'ok' ? 'ok' :
      node.status === 'warn' ? 'warn' :
      node.status === 'run' ? 'run' : '';
    const enabled = node.enabled !== false;

    el.innerHTML = `
      <div class="node-head">
        <span class="type">${NODE_TYPES[node.type].label}</span>
        <span class="id">${node.id}</span>
        <span class="enabled-dot ${enabled ? '' : 'off'}" title="${enabled ? 'enabled' : 'disabled'}"></span>
        <span class="status ${statusClass}"></span>
      </div>
      <div class="node-title">${escapeHtml(node.title)}</div>
      <div class="node-foot">
        <span>${escapeHtml(nodeFootText(node))}</span>
      </div>
      <div class="port in" data-port="in"></div>
      <div class="port out" data-port="out"></div>
    `;

    world.appendChild(el);
    attachNodeHandlers(el, node);
  }

  // Single-field summary shown in the node footer. Each type picks its
  // most identity-defining config field — language for scripts, op for
  // lenses, mode for cameras.
  function nodeFootText(node) {
    if (node.type === 'script') return node.config.lang || '';
    if (node.type === 'lens') return node.config.op || '';
    if (node.type === 'camera') return node.config.mode || '';
    return '';
  }

  function refreshNodeEl(node) {
    const el = document.getElementById(node.id);
    if (!el) return;
    el.style.left = node.x + 'px';
    el.style.top = node.y + 'px';
    el.style.setProperty('--flow', `var(--f${node.flow})`);
    el.querySelector('.node-title').textContent = node.title;
    const footSpan = el.querySelector('.node-foot span');
    if (footSpan) {
      footSpan.textContent = nodeFootText(node);
    }
    const statusEl = el.querySelector('.status');
    statusEl.className = 'status ' + (
      node.status === 'ok' ? 'ok' :
      node.status === 'warn' ? 'warn' :
      node.status === 'run' ? 'run' : '');
    const dotEl = el.querySelector('.enabled-dot');
    if (dotEl) {
      const enabled = node.enabled !== false;
      dotEl.className = 'enabled-dot' + (enabled ? '' : ' off');
      dotEl.title = enabled ? 'enabled' : 'disabled';
    }
    el.classList.toggle('disabled', node.enabled === false);
  }

  function refreshAllNodeStyles() {
    state.nodes.forEach(n => {
      const el = document.getElementById(n.id);
      if (el) el.style.setProperty('--flow', `var(--f${n.flow})`);
    });
    renderEdges();
  }

  function deleteNode(id) {
    const node = state.nodes.get(id);
    if (!node) return;
    // remove edges
    [...state.edges.values()].forEach(e => {
      if (e.from === id || e.to === id) state.edges.delete(e.id);
    });
    state.viewSpecs.forEach(s => { if (s) s.positions.delete(id); });
    state.nodes.delete(id);
    const el = document.getElementById(id);
    if (el) el.remove();
    if (state.selected === id) state.selected = null;
    if (state.expanded === id) closeInspector();
    recomputeFlows();
    refreshAllNodeStyles();
    renderEdges();
    updateSelInfo();
    updateCounts();
    maybeReflow();
  }

  function toggleEnabled(id) {
    const node = state.nodes.get(id);
    if (!node) return;
    node.enabled = node.enabled === false ? true : false;
    refreshNodeEl(node);
    renderEdges();
    // Update the toggle button in-place if the inspector is open for this node.
    // Avoids rebuilding the whole inspector, which would lose focus/scroll.
    if (state.expanded === id) {
      const btn = document.querySelector('#__toggle');
      if (btn) {
        const enabled = node.enabled !== false;
        btn.className = 'toggle ' + (enabled ? 'on' : 'off');
        btn.title = enabled ? 'enabled — click to disable' : 'disabled — click to enable';
        const label = btn.querySelector('.label');
        if (label) label.textContent = enabled ? 'on' : 'off';
      }
    }
  }

  // ---------- view specs ----------

  function captureViewSpec() {
    const positions = new Map();
    state.nodes.forEach(n => positions.set(n.id, { x: n.x, y: n.y }));
    return { positions, pan: { ...state.pan }, zoom: state.zoom };
  }

  function applyViewSpec(spec) {
    state.nodes.forEach(n => {
      const p = spec.positions.get(n.id);
      if (p) { n.x = p.x; n.y = p.y; }
      const el = document.getElementById(n.id);
      if (el) { el.style.left = n.x + 'px'; el.style.top = n.y + 'px'; }
    });
    state.pan = { ...spec.pan };
    state.zoom = spec.zoom;
    applyTransform();
    renderEdges();
    updateStackCues();
  }

  function commitActiveViewSpec() {
    state.viewSpecs[state.activeView] = captureViewSpec();
  }

  function updateViewUI() {
    const inAuto = !!state.autoLayout;
    viewBtnsEl.classList.toggle('hidden', inAuto);
    viewIndicatorEl.classList.toggle('hidden', inAuto);
    for (let i = 0; i < 3; i++) {
      document.getElementById(`view-dot-${i}`).classList.toggle('active', i === state.activeView);
    }
    viewIndicatorEl.textContent = `V${state.activeView + 1}`;
  }

  function switchToView(idx) {
    if (state.autoLayout || idx === state.activeView) return;
    commitActiveViewSpec();
    state.activeView = idx;
    // copy-on-first-visit: uninitialised slot mirrors current state
    if (!state.viewSpecs[idx]) state.viewSpecs[idx] = captureViewSpec();
    world.classList.add('layout-anim');
    clearTimeout(state._layoutAnimTimer);
    state._layoutAnimTimer = setTimeout(() => world.classList.remove('layout-anim'), 280);
    applyViewSpec(state.viewSpecs[idx]);
    updateViewUI();
  }

  // ---------- auto-layout (layered DAG) ----------
  // Assign each node a rank = longest path from any root, then position
  // ranks into columns and sort rows within a column by parent-barycenter
  // to reduce edge crossings.
  function computeAutoLayout() {
    const nodes = [...state.nodes.values()];
    if (nodes.length === 0) return new Map();

    const rank = new Map();
    const incoming = new Map();
    const outgoing = new Map();
    nodes.forEach(n => { incoming.set(n.id, []); outgoing.set(n.id, []); });
    state.edges.forEach(e => {
      incoming.get(e.to).push(e.from);
      outgoing.get(e.from).push(e.to);
    });

    // Kahn's topological order; rank = max(parent rank) + 1
    const queue = nodes.filter(n => incoming.get(n.id).length === 0).map(n => n.id);
    const indeg = new Map();
    nodes.forEach(n => indeg.set(n.id, incoming.get(n.id).length));
    queue.forEach(id => rank.set(id, 0));

    while (queue.length) {
      const id = queue.shift();
      const r = rank.get(id);
      outgoing.get(id).forEach(to => {
        const newR = Math.max(rank.get(to) ?? 0, r + 1);
        rank.set(to, newR);
        indeg.set(to, indeg.get(to) - 1);
        if (indeg.get(to) === 0) queue.push(to);
      });
    }
    // any remaining (cycle — shouldn't happen but defensive) get rank 0
    nodes.forEach(n => { if (!rank.has(n.id)) rank.set(n.id, 0); });

    // group by rank
    const cols = new Map();
    rank.forEach((r, id) => {
      if (!cols.has(r)) cols.set(r, []);
      cols.get(r).push(id);
    });

    // Initial row order per column: preserve flow index so related flows
    // cluster together, then stable by current y.
    cols.forEach((ids) => {
      ids.sort((a, b) => {
        const na = state.nodes.get(a), nb = state.nodes.get(b);
        if (na.flow !== nb.flow) return na.flow - nb.flow;
        return na.y - nb.y;
      });
    });

    // Barycenter pass (left-to-right): reorder each column's rows based on
    // mean row-index of their parents in the previous column.
    const sortedRanks = [...cols.keys()].sort((a, b) => a - b);
    const rowOf = new Map();
    sortedRanks.forEach(r => {
      cols.get(r).forEach((id, i) => rowOf.set(id, i));
    });
    for (let pass = 0; pass < 2; pass++) {
      for (let i = 1; i < sortedRanks.length; i++) {
        const r = sortedRanks[i];
        const ids = cols.get(r);
        ids.sort((a, b) => {
          const pa = incoming.get(a);
          const pb = incoming.get(b);
          const ba = pa.length ? pa.reduce((s, p) => s + (rowOf.get(p) ?? 0), 0) / pa.length : rowOf.get(a);
          const bb = pb.length ? pb.reduce((s, p) => s + (rowOf.get(p) ?? 0), 0) / pb.length : rowOf.get(b);
          return ba - bb;
        });
        ids.forEach((id, i) => rowOf.set(id, i));
      }
    }

    // Assign positions: columns spaced horizontally, rows vertically.
    // Center all columns against a common vertical axis so flows read
    // straight-across rather than zig-zagging between off-center columns.
    const COL_GAP = NODE_SIZE + 56;
    const ROW_GAP = NODE_SIZE + 24;
    const maxRows = Math.max(...sortedRanks.map(r => cols.get(r).length));
    const centerY = (maxRows * ROW_GAP - (ROW_GAP - NODE_SIZE)) / 2;
    const positions = new Map();
    sortedRanks.forEach(r => {
      const ids = cols.get(r);
      const totalH = ids.length * ROW_GAP - (ROW_GAP - NODE_SIZE);
      const startY = centerY - totalH / 2;
      ids.forEach((id, i) => {
        positions.set(id, {
          x: r * COL_GAP,
          y: startY + i * ROW_GAP,
        });
      });
    });

    // Safety pass: in theory positions are already overlap-free by
    // construction, but if the node list ever contains duplicates or we
    // grow more layout rules later, guarantee no two nodes coincide.
    const occupied = new Map(); // "x,y" -> id
    positions.forEach((p, id) => {
      let key = `${p.x},${p.y}`;
      let bumps = 0;
      while (occupied.has(key) && bumps < 50) {
        p.y += ROW_GAP;
        key = `${p.x},${p.y}`;
        bumps++;
      }
      occupied.set(key, id);
    });
    return positions;
  }

  function applyAutoLayout() {
    const positions = computeAutoLayout();
    state.nodes.forEach(n => {
      // stash freeform position once so we can restore it later
      if (n.freeX === undefined) { n.freeX = n.x; n.freeY = n.y; }
      const p = positions.get(n.id);
      if (p) { n.x = p.x; n.y = p.y; }
      const el = document.getElementById(n.id);
      if (el) {
        el.style.left = n.x + 'px';
        el.style.top = n.y + 'px';
      }
    });
    renderEdges();
  }

  function restoreFreeformLayout() {
    state.nodes.forEach(n => {
      if (n.freeX !== undefined) {
        n.x = n.freeX;
        n.y = n.freeY;
        n.freeX = undefined;
        n.freeY = undefined;
      }
      const el = document.getElementById(n.id);
      if (el) {
        el.style.left = n.x + 'px';
        el.style.top = n.y + 'px';
      }
    });
    renderEdges();
    updateStackCues();
  }

  function toggleAutoLayout() {
    state.autoLayout = !state.autoLayout;
    const btn = document.getElementById('auto-layout-btn');
    if (btn) btn.classList.toggle('on', state.autoLayout);
    world.classList.toggle('auto-layout', state.autoLayout);
    // brief transition class so the mode switch animates; removed after
    world.classList.add('layout-anim');
    clearTimeout(state._layoutAnimTimer);
    state._layoutAnimTimer = setTimeout(() => world.classList.remove('layout-anim'), 280);

    if (state.autoLayout) {
      commitActiveViewSpec();
      applyAutoLayout();
    } else {
      const spec = state.viewSpecs[state.activeView];
      if (spec) { applyViewSpec(spec); } else { restoreFreeformLayout(); }
    }
    updateViewUI();
  }

  // Called after any graph mutation; re-runs auto-layout if it's on.
  function maybeReflow() {
    if (state.autoLayout) applyAutoLayout();
    updateStackCues();
  }

  // ---------- overlap / stack cues ----------
  // In freeform mode nodes can be dragged on top of one another. Instead of
  // hiding the collision, visualize it: group overlapping nodes into a
  // "stack," fan them with a small offset, add layered shadows, and show a
  // count badge on the topmost node. Removes the need for pixel-perfect
  // placement while still making structure readable.
  function updateStackCues() {
    // Clear previous
    state.nodes.forEach(n => {
      const el = document.getElementById(n.id);
      if (!el) return;
      el.classList.remove('stacked');
      el.style.removeProperty('--stack-offset');
      const badge = el.querySelector('.stack-badge');
      if (badge) badge.remove();
    });
    if (state.autoLayout) return; // auto-layout guarantees no overlap

    // Cluster nodes whose centers are within OVERLAP_THRESH of another
    // node already in a cluster. Union-find would be cleanest but for
    // small N a quadratic sweep is fine and easier to read.
    const OVERLAP_THRESH = NODE_SIZE * 0.55; // ≥55% horizontal+vertical overlap
    const arr = [...state.nodes.values()];
    const parent = new Map();
    const find = (x) => { while (parent.get(x) !== x) { parent.set(x, parent.get(parent.get(x))); x = parent.get(x); } return x; };
    const union = (a, b) => { const ra = find(a), rb = find(b); if (ra !== rb) parent.set(ra, rb); };
    arr.forEach(n => parent.set(n.id, n.id));
    for (let i = 0; i < arr.length; i++) {
      for (let j = i + 1; j < arr.length; j++) {
        const a = arr[i], b = arr[j];
        if (Math.abs(a.x - b.x) < OVERLAP_THRESH && Math.abs(a.y - b.y) < OVERLAP_THRESH) {
          union(a.id, b.id);
        }
      }
    }
    // Group by root
    const groups = new Map();
    arr.forEach(n => {
      const r = find(n.id);
      if (!groups.has(r)) groups.set(r, []);
      groups.get(r).push(n);
    });

    // For each group with >1 member, fan them out visually.
    groups.forEach((members) => {
      if (members.length < 2) return;
      // Order by insertion (node id) so ordering is stable; topmost = last.
      members.sort((a, b) => parseInt(a.id.slice(1)) - parseInt(b.id.slice(1)));
      members.forEach((n, i) => {
        const el = document.getElementById(n.id);
        if (!el) return;
        el.classList.add('stacked');
        // Diagonal fan: each card offsets ~4px right & down from the one below.
        const off = i * 4;
        el.style.setProperty('--stack-offset', `${off}px`);
        // Higher-indexed cards render on top.
        el.style.zIndex = String(3 + i);
      });
      // Badge on topmost card showing total count.
      const top = members[members.length - 1];
      const topEl = document.getElementById(top.id);
      if (topEl) {
        const badge = document.createElement('div');
        badge.className = 'stack-badge';
        badge.textContent = String(members.length);
        badge.title = `${members.length} overlapping nodes`;
        topEl.appendChild(badge);
      }
    });
  }

  function attachNodeHandlers(el, node) {
    let startPt, origX, origY, moved, wasSelected;

    // body drag = move node
    onPointerDrag(el, {
      onStart: (e, pt) => {
        if (e.target.classList.contains('port')) return false;
        if (e.target.closest && e.target.closest('.port')) return false;
        e.stopPropagation();
        if (e.cancelable) e.preventDefault();

        // Remember whether this node was already selected BEFORE this gesture.
        // This is what drives the two-stage tap: if it was already selected
        // and the user taps again (no drag), we open the inspector.
        wasSelected = (state.selected === node.id);
        startPt = pt;
        origX = node.x;
        origY = node.y;
        moved = false;
      },
      onMove: (e, pt) => {
        // In auto-layout mode, nodes are positioned by the layout engine,
        // so dragging is disabled. Taps (no movement) still work.
        if (state.autoLayout) return;
        const dx = (pt.x - startPt.x) / state.zoom;
        const dy = (pt.y - startPt.y) / state.zoom;
        if (!moved && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) {
          moved = true;
          el.classList.add('dragging');
          // Temporarily exit any stack; the node follows the cursor cleanly
          // and will be re-evaluated on drop. Other members of its old stack
          // keep their offsets — we recompute everything on drop.
          el.classList.remove('stacked');
          el.style.removeProperty('--stack-offset');
          const oldBadge = el.querySelector('.stack-badge');
          if (oldBadge) oldBadge.remove();
          setMode('drag');
          // commit to selection once we're sure it's a drag
          if (!wasSelected) select(node.id);
        }
        if (moved) {
          node.x = origX + dx;
          node.y = origY + dy;
          el.style.left = node.x + 'px';
          el.style.top = node.y + 'px';
          renderEdges();
        }
      },
      onEnd: () => {
        el.classList.remove('dragging');
        if (moved) {
          setMode('normal');
          updateStackCues();
        }
        if (!moved) {
          // Two-stage activation: first tap selects + highlights flow,
          // second tap on the already-selected node opens the inspector.
          if (wasSelected) {
            openInspector(node.id);
          } else {
            select(node.id);
          }
        }
      },
    });

    // port: drag creates an edge (and possibly a child node).
    // The drag doesn't commit until the pointer moves past a threshold —
    // a tap on a port without movement falls through to the normal
    // node tap (select, then second-tap to expand). This makes ports
    // forgiving for touch: fat-fingering the port edge still works.
    const PORT_DRAG_THRESH = 6; // px of screen movement before commit
    el.querySelectorAll('.port').forEach(portEl => {
      let portStartPt = null;
      let portCommitted = false;
      let portWhich = null;
      let portWasSelected = false;

      onPointerDrag(portEl, {
        onStart: (e, pt) => {
          e.stopPropagation();
          if (e.cancelable) e.preventDefault();
          portStartPt = pt;
          portCommitted = false;
          portWhich = portEl.dataset.port;
          // Remember node-selection state so the fallback tap behaves
          // identically to a tap on the node body.
          portWasSelected = (state.selected === node.id);
        },
        onMove: (e, pt) => {
          if (!portCommitted) {
            const dx = pt.x - portStartPt.x;
            const dy = pt.y - portStartPt.y;
            if (Math.hypot(dx, dy) < PORT_DRAG_THRESH) return;
            // Cross the threshold: now actually begin the port-drag.
            portCommitted = true;
            beginPortDrag(node, portWhich);
          }
          if (!state.portDrag) return;
          const w = worldFromScreen(pt.x, pt.y);
          state.portDrag.curWX = w.x;
          state.portDrag.curWY = w.y;
          renderEdges();
        },
        onEnd: (e, pt) => {
          if (!portCommitted) {
            // No movement: treat as a tap on the node. Same two-stage
            // activation as the node body.
            if (portWasSelected) {
              openInspector(node.id);
            } else {
              select(node.id);
            }
            return;
          }
          if (!state.portDrag) return;
          const targetNodeEl = nodeElAtPoint(pt.x, pt.y);
          const pd = state.portDrag;
          state.portDrag = null;
          setMode('normal');

          if (targetNodeEl && targetNodeEl.dataset.id !== pd.fromNode.id) {
            const targetNode = state.nodes.get(targetNodeEl.dataset.id);
            if (pd.which === 'out') {
              tryConnect(pd.fromNode.id, targetNode.id);
            } else {
              tryConnect(targetNode.id, pd.fromNode.id);
            }
          } else if (!targetNodeEl) {
            // empty canvas: spawn child node
            const w = worldFromScreen(pt.x, pt.y);
            const childX = w.x - NODE_SIZE / 2;
            const childY = w.y - NODE_SIZE / 2;
            const newNode = createNode('script', childX, childY);
            if (pd.which === 'out') {
              tryConnect(pd.fromNode.id, newNode.id);
            } else {
              tryConnect(newNode.id, pd.fromNode.id);
            }
            select(newNode.id);
          }
          renderEdges();
        },
      });
    });
  }

  // ---------- port drag / connect / create-child ----------
  // Just sets up port-drag state. Movement + end are handled by the pointer-drag
  // callbacks in attachNodeHandlers.
  function beginPortDrag(fromNode, which) {
    const portPos = getPortWorld(fromNode, which);
    state.portDrag = {
      fromNode, which,
      startWX: portPos.x, startWY: portPos.y,
      curWX: portPos.x, curWY: portPos.y,
    };
    setMode('port-drag');
    renderEdges();
  }

  function getPortWorld(node, which) {
    const cx = which === 'out' ? node.x + NODE_SIZE : node.x;
    const cy = node.y + NODE_SIZE / 2;
    return { x: cx, y: cy };
  }

  function tryConnect(fromId, toId) {
    if (fromId === toId) return false;
    // no duplicate
    for (const e of state.edges.values()) {
      if (e.from === fromId && e.to === toId) return false;
    }
    // no cycles (DAG)
    if (wouldCreateCycle(fromId, toId)) return false;
    const id = edgeId();
    state.edges.set(id, { id, from: fromId, to: toId });
    recomputeFlows();
    refreshAllNodeStyles();
    renderEdges();
    updateCounts();
    maybeReflow();
    return true;
  }

  function wouldCreateCycle(fromId, toId) {
    // walk downstream from toId; if we hit fromId, cycle
    const stack = [toId];
    const visited = new Set();
    while (stack.length) {
      const n = stack.pop();
      if (n === fromId) return true;
      if (visited.has(n)) continue;
      visited.add(n);
      state.edges.forEach(e => {
        if (e.from === n) stack.push(e.to);
      });
    }
    return false;
  }

  // ---------- edges rendering ----------
  function renderEdges() {
    edgesSvg.innerHTML = '';

    // defs with drop shadow filter
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    defs.innerHTML = `
      <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="1.2" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    `;
    edgesSvg.appendChild(defs);

    state.edges.forEach(e => {
      const from = state.nodes.get(e.from);
      const to = state.nodes.get(e.to);
      if (!from || !to) return;
      const p1 = getPortWorld(from, 'out');
      const p2 = getPortWorld(to, 'in');
      const pathD = bezierPath(p1.x, p1.y, p2.x, p2.y);

      const flow = from.flow;
      const hueVar = `var(--f${flow})`;
      const color = `hsl(${getHueForFlow(flow)})`;
      const isSel = state.selectedEdge === e.id;

      // hit area (wider invisible stroke for easier clicking/tapping)
      const hit = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      hit.setAttribute('d', pathD);
      hit.setAttribute('class', 'edge-hit');
      hit.dataset.id = e.id;
      const selectEdge = (ev) => {
        ev.stopPropagation();
        if (ev.cancelable) ev.preventDefault();
        state.selectedEdge = e.id;
        state.selected = null;
        document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
        renderEdges();
        updateSelInfo();
      };
      hit.addEventListener('mousedown', selectEdge);
      hit.addEventListener('touchstart', selectEdge, { passive: false });
      edgesSvg.appendChild(hit);

      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute('d', pathD);
      const inFlow = !state.flowHighlight ||
        (state.flowHighlight.has(e.from) && state.flowHighlight.has(e.to));
      const edgeDisabled = from.enabled === false || to.enabled === false;
      const cls = 'edge' + (isSel ? ' selected' : '') + (!inFlow ? ' dim' : '');
      path.setAttribute('class', cls);
      path.setAttribute('stroke', color);
      path.style.color = color;
      let baseOpacity = isSel ? 1 : 0.82;
      if (edgeDisabled) baseOpacity *= 0.45;
      path.style.opacity = String(baseOpacity);
      if (edgeDisabled) path.setAttribute('stroke-dasharray', '4 3');
      if (isSel) path.setAttribute('filter', 'url(#glow)');
      edgesSvg.appendChild(path);
    });

    // ghost line while port-dragging
    if (state.portDrag) {
      const pd = state.portDrag;
      let d;
      if (pd.which === 'out') {
        d = bezierPath(pd.startWX, pd.startWY, pd.curWX, pd.curWY);
      } else {
        d = bezierPath(pd.curWX, pd.curWY, pd.startWX, pd.startWY);
      }
      const ghost = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      ghost.setAttribute('d', d);
      ghost.setAttribute('class', 'ghost');
      edgesSvg.appendChild(ghost);
    }
  }

  function bezierPath(x1, y1, x2, y2) {
    const dx = Math.max(40, Math.abs(x2 - x1) * 0.5);
    const c1x = x1 + dx;
    const c2x = x2 - dx;
    return `M ${x1} ${y1} C ${c1x} ${y1}, ${c2x} ${y2}, ${x2} ${y2}`;
  }

  function getHueForFlow(idx) {
    const map = {
      0: '200 80% 60%',
      1: '30 90% 62%',
      2: '330 75% 65%',
      3: '150 60% 58%',
      4: '260 70% 70%',
      5: '0 75% 65%',
    };
    return map[idx % FLOW_COUNT];
  }

  // ---------- selection ----------
  // Find all nodes connected to `id` via edges in either direction
  // (the whole connected component). Returns a Set of node ids.
  function getFlowMembers(id) {
    const members = new Set();
    const stack = [id];
    while (stack.length) {
      const n = stack.pop();
      if (members.has(n)) continue;
      members.add(n);
      state.edges.forEach(e => {
        if (e.from === n && !members.has(e.to)) stack.push(e.to);
        if (e.to === n && !members.has(e.from)) stack.push(e.from);
      });
    }
    return members;
  }

  function applyFlowHighlight(id) {
    state.flowHighlight = id ? getFlowMembers(id) : null;
    const members = state.flowHighlight;
    if (!members) {
      world.classList.remove('flow-highlight');
      world.classList.remove('flash');
      document.querySelectorAll('.node.in-flow').forEach(n => n.classList.remove('in-flow'));
      renderEdges();
      return;
    }
    const wasHighlighted = world.classList.contains('flow-highlight');
    world.classList.add('flow-highlight');
    state.nodes.forEach(n => {
      const el = document.getElementById(n.id);
      if (!el) return;
      el.classList.toggle('in-flow', members.has(n.id));
    });
    // Brief flash when highlight first turns on (or switches to a different
    // flow). Removed after the animation so re-clicks still trigger it.
    if (!wasHighlighted) {
      world.classList.add('flash');
      clearTimeout(state._flashTimer);
      state._flashTimer = setTimeout(() => world.classList.remove('flash'), 500);
    } else {
      // switching to different flow — restart flash
      world.classList.remove('flash');
      // force reflow to restart the animation
      void world.offsetWidth;
      world.classList.add('flash');
      clearTimeout(state._flashTimer);
      state._flashTimer = setTimeout(() => world.classList.remove('flash'), 500);
    }
    renderEdges();
  }

  function select(id) {
    state.selected = id;
    state.selectedEdge = null;
    document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
    const el = document.getElementById(id);
    if (el) el.classList.add('selected');
    applyFlowHighlight(id);
    updateSelInfo();
  }

  function deselect() {
    state.selected = null;
    state.selectedEdge = null;
    document.querySelectorAll('.node.selected').forEach(n => n.classList.remove('selected'));
    applyFlowHighlight(null);
    updateSelInfo();
  }

  function updateSelInfo() {
    if (state.selected) {
      const n = state.nodes.get(state.selected);
      selInfoEl.textContent = `${n.id} · ${n.type} · ${n.title}`;
    } else if (state.selectedEdge) {
      const e = state.edges.get(state.selectedEdge);
      selInfoEl.textContent = `edge ${e.id} · ${e.from} → ${e.to}`;
    } else {
      selInfoEl.textContent = '—';
    }
  }

  // ---------- inspector ----------
  function openInspector(id) {
    const node = state.nodes.get(id);
    if (!node) return;
    state.expanded = id;
    select(id);
    closeInspectorDom();

    const inspector = document.createElement('div');
    inspector.className = 'inspector';
    inspector.id = '__inspector';

    // find upstream
    const upstream = [...state.edges.values()]
      .filter(e => e.to === id)
      .map(e => state.nodes.get(e.from));

    const typeSpec = NODE_TYPES[node.type];

    const enabled = node.enabled !== false;
    inspector.innerHTML = `
      <div class="inspector-head">
        <span class="tag" style="--flow: var(--f${node.flow})">${typeSpec.label}</span>
        <input class="title" value="${escapeHtml(node.title)}" />
        <button class="toggle ${enabled ? 'on' : 'off'}" id="__toggle" title="${enabled ? 'enabled — click to disable' : 'disabled — click to enable'}">
          <span class="track"><span class="knob"></span></span>
          <span class="label">${enabled ? 'on' : 'off'}</span>
        </button>
        <span class="close" id="__close">×</span>
      </div>
      <div class="inspector-body">
        <div class="field">
          <label>upstream (${upstream.length})</label>
          <div class="upstream">
            ${upstream.length === 0
              ? '<div class="none">no upstream — root of a flow</div>'
              : upstream.map(u => `
                <div class="row">
                  <span class="dot" style="background: hsl(${getHueForFlow(u.flow)})"></span>
                  <b>${escapeHtml(u.title)}</b>
                  <span>${u.id} · ${u.type}</span>
                </div>
              `).join('')
            }
          </div>
        </div>
        ${typeSpec.fields.map(f => fieldHtml(f, node.config[f.key])).join('')}
      </div>
      <div class="inspector-foot">
        <span class="key"><kbd>esc</kbd> close</span>
        <span class="key"><kbd>d</kbd> toggle</span>
        <span class="key"><kbd>x</kbd> delete</span>
        <span class="key" style="margin-left:auto">${node.id}</span>
      </div>
    `;

    // Centered via CSS (left/top 50% + translate). Just set the flow color.
    inspector.style.setProperty('--flow', `var(--f${node.flow})`);

    // Backdrop: click outside closes. Append before inspector so it sits underneath.
    const backdrop = document.createElement('div');
    backdrop.className = 'inspector-backdrop';
    backdrop.id = '__inspector-backdrop';
    backdrop.addEventListener('mousedown', closeInspector);
    backdrop.addEventListener('touchstart', (e) => {
      if (e.cancelable) e.preventDefault();
      closeInspector();
    }, { passive: false });
    document.body.appendChild(backdrop);
    document.body.appendChild(inspector);

    // handlers
    inspector.querySelector('#__close').addEventListener('click', closeInspector);
    const toggleBtn = inspector.querySelector('#__toggle');
    toggleBtn.addEventListener('click', () => {
      toggleEnabled(node.id);
    });
    const titleInput = inspector.querySelector('input.title');
    titleInput.addEventListener('input', (e) => {
      node.title = e.target.value;
      refreshNodeEl(node);
      updateSelInfo();
    });
    titleInput.focus();
    titleInput.select();

    typeSpec.fields.forEach(f => {
      const input = inspector.querySelector(`[data-key="${f.key}"]`);
      if (input) {
        input.addEventListener('input', (e) => {
          node.config[f.key] = e.target.value;
          refreshNodeEl(node);
        });
      }
    });

    // prevent global keys from firing when typing
    inspector.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeInspector();
        e.stopPropagation();
      }
      // don't stop propagation for everything or we lose typing; only escape
    });
  }

  function fieldHtml(f, val) {
    const v = val == null ? '' : val;
    if (f.type === 'textarea') {
      return `<div class="field">
        <label>${f.label}</label>
        <textarea data-key="${f.key}">${escapeHtml(v)}</textarea>
      </div>`;
    }
    if (f.type === 'select') {
      return `<div class="field">
        <label>${f.label}</label>
        <select data-key="${f.key}">
          ${f.options.map(o => `<option value="${o}"${o === v ? ' selected' : ''}>${o}</option>`).join('')}
        </select>
      </div>`;
    }
    return `<div class="field">
      <label>${f.label}</label>
      <input data-key="${f.key}" value="${escapeHtml(v)}" />
    </div>`;
  }

  function closeInspector() {
    state.expanded = null;
    closeInspectorDom();
  }
  function closeInspectorDom() {
    const el = document.getElementById('__inspector');
    if (el) el.remove();
    const bd = document.getElementById('__inspector-backdrop');
    if (bd) bd.remove();
  }

  // ---------- pan ----------
  // Decide whether a pointer-down on the canvas should start a pan
  // (rather than being handled by a child like a node or edge-hit).
  function isCanvasBackdrop(target) {
    if (target === canvas) return true;
    if (target.id === 'world') return true;
    if (target.classList && target.classList.contains('grid')) return true;
    // SVG edges root: pan only if we didn't hit an edge-hit path
    if (target.tagName === 'svg' && !target.classList.contains('edge-hit')) return true;
    return false;
  }

  onPointerDrag(canvas, {
    onStart: (e, pt) => {
      if (!isCanvasBackdrop(e.target)) return false;
      // two-finger touch means pinch, not pan — let the pinch handler take it
      if (e.type === 'touchstart' && e.touches.length >= 2) return false;
      if (e.cancelable) e.preventDefault();

      // Don't clear selection yet — wait until we know whether this is a
      // pan (drag) or a tap on empty canvas. Pan preserves the flow
      // highlight so the user can look around while keeping context.
      setMode('pan');
      canvas.classList.add('panning');

      canvas._panStart = { pt, panX: state.pan.x, panY: state.pan.y, moved: false };
    },
    onMove: (e, pt) => {
      const ps = canvas._panStart;
      if (!ps) return;
      // if a second finger lands mid-pan, abort pan (pinch will take over)
      if (e.touches && e.touches.length >= 2) return;
      const dx = pt.x - ps.pt.x;
      const dy = pt.y - ps.pt.y;
      if (!ps.moved && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) ps.moved = true;
      state.pan.x = ps.panX + dx;
      state.pan.y = ps.panY + dy;
      applyTransform();
    },
    onEnd: () => {
      const ps = canvas._panStart;
      canvas._panStart = null;
      canvas.classList.remove('panning');
      setMode('normal');
      // Tap on empty canvas (no drag) = clear selection + close inspector.
      // Pan = leave selection alone.
      if (ps && !ps.moved) {
        closeInspector();
        deselect();
      }
    },
  });

  // ---------- pinch zoom (touch) ----------
  // Native two-finger gesture; runs independently of the pan handler.
  let pinchState = null;
  canvas.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const t1 = e.touches[0], t2 = e.touches[1];
      const dx = t2.clientX - t1.clientX;
      const dy = t2.clientY - t1.clientY;
      const dist = Math.hypot(dx, dy);
      const cx = (t1.clientX + t2.clientX) / 2;
      const cy = (t1.clientY + t2.clientY) / 2;
      pinchState = {
        startDist: dist,
        startZoom: state.zoom,
        startPan: { x: state.pan.x, y: state.pan.y },
        anchor: { x: cx, y: cy },
        startCenter: { x: cx, y: cy },
      };
      if (e.cancelable) e.preventDefault();
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && pinchState) {
      const t1 = e.touches[0], t2 = e.touches[1];
      const dx = t2.clientX - t1.clientX;
      const dy = t2.clientY - t1.clientY;
      const dist = Math.hypot(dx, dy);
      const cx = (t1.clientX + t2.clientX) / 2;
      const cy = (t1.clientY + t2.clientY) / 2;

      const newZoom = Math.max(0.3, Math.min(2.5,
        pinchState.startZoom * (dist / pinchState.startDist)));

      const rect = canvas.getBoundingClientRect();
      // keep the pinch anchor (its original screen point) over the same world point.
      const ax = pinchState.startCenter.x - rect.left;
      const ay = pinchState.startCenter.y - rect.top;
      // base pan so anchor world-point stays under the ORIGINAL center,
      // then translate by how much the center has moved since pinch start.
      let newPanX = ax - (ax - pinchState.startPan.x) * (newZoom / pinchState.startZoom);
      let newPanY = ay - (ay - pinchState.startPan.y) * (newZoom / pinchState.startZoom);
      newPanX += (cx - pinchState.startCenter.x);
      newPanY += (cy - pinchState.startCenter.y);

      state.zoom = newZoom;
      state.pan.x = newPanX;
      state.pan.y = newPanY;
      applyTransform();
      if (e.cancelable) e.preventDefault();
    }
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    if (e.touches.length < 2) pinchState = null;
  });

  // zoom with wheel
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    const newZoom = Math.max(0.3, Math.min(2.5, state.zoom * factor));
    // zoom around cursor
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    state.pan.x = mx - (mx - state.pan.x) * (newZoom / state.zoom);
    state.pan.y = my - (my - state.pan.y) * (newZoom / state.zoom);
    state.zoom = newZoom;
    applyTransform();
  }, { passive: false });

  // ---------- command palette + toasts ----------

  const cmdpalWrap    = document.getElementById('cmdpal-wrap');
  const cmdpalInput   = document.getElementById('cmdpal-input');
  const toastStackEl  = document.getElementById('toast-stack');
  let palOpen = false;

  function openPal() {
    palOpen = true;
    cmdpalWrap.classList.add('cmdpal-open');
    requestAnimationFrame(() => cmdpalInput.focus());
  }

  function closePal() {
    palOpen = false;
    cmdpalWrap.classList.remove('cmdpal-open');
    cmdpalInput.blur(); // return focus to canvas so keyboard shortcuts work again
    setTimeout(() => { cmdpalInput.value = ''; }, 160);
  }

  function togglePal() {
    if (palOpen) closePal(); else openPal();
  }

  function addToast(text, dir) {
    const toast = document.createElement('div');
    toast.className = `toast toast-${dir}`;
    toast.innerHTML =
      `<span class="toast-text">${escapeHtml(text)}</span>` +
      `<button class="toast-close" aria-label="dismiss">×</button>`;

    // Start off-screen to the right so we can slide in
    toast.style.transform = 'translateX(calc(100% + 24px))';
    toast.style.opacity = '0';
    toast.style.transition = 'none';

    if (dir === 'up') {
      // Append at bottom — container (bottom-anchored) grows upward,
      // existing toasts naturally rise with the flex layout.
      toastStackEl.appendChild(toast);
    } else {
      // Prepend at top — new toast appears above existing ones.
      // Give existing toasts a brief downward nudge to signal "push down".
      [...toastStackEl.children].forEach(t => {
        t.style.transition = 'transform 0.18s ease';
        t.style.transform = `translateY(${Math.round(t.offsetHeight * 0.15)}px)`;
        setTimeout(() => { if (t.parentNode) { t.style.transform = ''; } }, 200);
      });
      toastStackEl.insertBefore(toast, toastStackEl.firstChild);
    }

    // Trigger slide-in on next two frames (allows layout to settle first)
    requestAnimationFrame(() => requestAnimationFrame(() => {
      toast.style.transition = '';
      toast.style.transform = '';
      toast.style.opacity = '';
    }));

    const dismiss = () => {
      if (!toast.parentNode) return;
      clearTimeout(toast._t);
      toast.style.transform = 'translateX(calc(100% + 24px))';
      toast.style.opacity = '0';
      setTimeout(() => { if (toast.parentNode) toast.remove(); }, 240);
    };

    toast.querySelector('.toast-close').addEventListener('click', dismiss);
    toast._t = setTimeout(dismiss, 8000);
  }

  cmdpalInput.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      e.stopPropagation(); // prevent global handler from blurring + closing inspector
      if (cmdpalInput.value.length > 0) {
        cmdpalInput.value = '';
      } else {
        closePal();
      }
      return;
    }
    if (e.key === 'Enter' && e.shiftKey) {
      e.preventDefault();
      e.stopPropagation();
      const text = cmdpalInput.value.trim();
      if (!text) return;
      // Cmd/Ctrl held alongside Shift+Enter → push down; plain Shift+Enter → push up
      addToast(text, (e.metaKey || e.ctrlKey) ? 'down' : 'up');
      cmdpalInput.value = '';
    }
  });

  document.getElementById('cmdpal-backdrop').addEventListener('click', closePal);

  // ---------- keyboard ----------
  document.addEventListener('keydown', (e) => {
    // cmd/ctrl+p: toggle command palette — fires regardless of focus
    if (e.key === 'p' && (e.metaKey || e.ctrlKey) && !e.shiftKey) {
      e.preventDefault();
      togglePal();
      return;
    }

    // if user is typing in inspector, don't intercept
    const ae = document.activeElement;
    if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA' || ae.tagName === 'SELECT')) {
      if (e.key === 'Escape') {
        ae.blur();
        closeInspector();
      }
      return;
    }

    if (e.key === 'Escape') {
      if (state.expanded) { closeInspector(); return; }
      deselect();
      return;
    }

    if (e.key === 'Enter') {
      if (!state.selected) {
        // nothing selected: pick the top-left-most node so Enter has a target
        if (state.nodes.size > 0) {
          const first = [...state.nodes.values()].sort((a,b) => a.y - b.y || a.x - b.x)[0];
          select(first.id);
          centerOn(first);
        }
      } else {
        // already selected: expand the inspector
        openInspector(state.selected);
      }
      return;
    }

    if (e.key === 'h' || e.key === 'j' || e.key === 'k' || e.key === 'l') {
      navDir(e.key);
      e.preventDefault();
      return;
    }

    if (e.key === 'n') {
      spawnAtView('script');
      return;
    }
    if (e.key === 'N') {
      spawnAtView('lens');
      return;
    }
    if (e.key === 'm') {
      spawnAtView('camera');
      return;
    }

    if (e.key === 'x') {
      if (state.selected) deleteNode(state.selected);
      else if (state.selectedEdge) {
        state.edges.delete(state.selectedEdge);
        state.selectedEdge = null;
        recomputeFlows();
        refreshAllNodeStyles();
        renderEdges();
        updateCounts();
        updateSelInfo();
        maybeReflow();
      }
      return;
    }

    if (e.key === 'c') {
      setMode(state.mode === 'connect' ? 'normal' : 'connect');
      return;
    }

    if (e.key === 'd') {
      if (state.selected) toggleEnabled(state.selected);
      return;
    }

    if (e.key === 'a') {
      toggleAutoLayout();
      return;
    }

    if (e.key === 'v') {
      switchToView((state.activeView + 1) % 3);
      return;
    }

    if (e.key === 'f' || e.key === '0') {
      resetView();
      return;
    }

    if (e.key === '1') {
      // cycle node type of selected
      if (state.selected) {
        const n = state.nodes.get(state.selected);
        n.type = n.type === 'script' ? 'lens' : 'script';
        const spec = NODE_TYPES[n.type];
        n.config = { ...spec.defaultConfig };
        refreshNodeEl(node => node.id === n.id);
        // easier: full rerender of this node
        const el = document.getElementById(n.id);
        if (el) {
          el.remove();
          renderNode(n);
          select(n.id);
        }
      }
    }
  });

  function navDir(key) {
    if (state.nodes.size === 0) return;
    if (!state.selected) {
      // select topmost-leftmost
      const first = [...state.nodes.values()].sort((a,b) => a.y - b.y || a.x - b.x)[0];
      select(first.id);
      centerOn(first);
      return;
    }
    const cur = state.nodes.get(state.selected);
    const cx = cur.x + NODE_SIZE/2;
    const cy = cur.y + NODE_SIZE/2;

    let best = null, bestScore = Infinity;
    state.nodes.forEach(n => {
      if (n.id === cur.id) return;
      const nx = n.x + NODE_SIZE/2;
      const ny = n.y + NODE_SIZE/2;
      const dx = nx - cx;
      const dy = ny - cy;
      let ok = false, primary, secondary;
      if (key === 'l') { ok = dx > 5; primary = dx; secondary = Math.abs(dy); }
      else if (key === 'h') { ok = dx < -5; primary = -dx; secondary = Math.abs(dy); }
      else if (key === 'j') { ok = dy > 5; primary = dy; secondary = Math.abs(dx); }
      else if (key === 'k') { ok = dy < -5; primary = -dy; secondary = Math.abs(dx); }
      if (!ok) return;
      // weight: favor alignment heavily, then distance
      const score = secondary * 3 + primary;
      if (score < bestScore) { bestScore = score; best = n; }
    });
    if (best) {
      select(best.id);
      centerOn(best);
    }
  }

  function centerOn(node) {
    // ensure node visible; if not, pan
    const rect = canvas.getBoundingClientRect();
    const s = screenFromWorld(node.x + NODE_SIZE/2, node.y + NODE_SIZE/2);
    const margin = 60;
    if (s.x < rect.left + margin || s.x > rect.right - margin ||
        s.y < rect.top + margin || s.y > rect.bottom - margin) {
      state.pan.x += (rect.left + rect.width/2) - s.x;
      state.pan.y += (rect.top + rect.height/2) - s.y;
      applyTransform();
    }
  }

  function spawnAtView(type) {
    const rect = canvas.getBoundingClientRect();
    let wx, wy;
    if (state.selected) {
      const cur = state.nodes.get(state.selected);
      wx = cur.x + NODE_SIZE + 60;
      wy = cur.y;
    } else {
      const c = worldFromScreen(rect.left + rect.width/2, rect.top + rect.height/2);
      wx = c.x - NODE_SIZE/2;
      wy = c.y - NODE_SIZE/2;
    }
    const n = createNode(type, wx, wy);
    if (state.selected && state.selected !== n.id) {
      tryConnect(state.selected, n.id);
    }
    select(n.id);
  }

  function resetView() {
    state.pan = { x: 120, y: 80 };
    state.zoom = 1;
    applyTransform();
  }

  // ---------- utils ----------
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ---------- seed demo graph ----------
  function seed() {
    // flow A: ingest -> filter -> transform -> sink
    const a1 = createNode('script', 0,   0,   { title: 'fetch api logs', config: { lang: 'js', code: 'return await fetch("/logs").then(r=>r.json());' }, status: 'ok' });
    const a2 = createNode('lens',   160, 0,   { title: 'errors only', config: { op: 'filter', expr: 'item.level === "error"', view: 'table' }, status: 'ok' });
    const a3 = createNode('script', 320, 0,   { title: 'parse stack traces', config: { lang: 'python', code: 'import re\n# ...' }, status: 'run' });
    const a4 = createNode('lens',   480, 0,   { title: 'group by module', config: { op: 'group', expr: 'item.module', view: 'cards' }, status: 'idle' });

    // flow B: separate root, joins into flow A at transform
    const b1 = createNode('script', 0,   140, { title: 'prod metrics feed', config: { lang: 'js', code: '// sse stream' }, status: 'ok' });
    const b2 = createNode('lens',   160, 140, { title: 'last 1h window', config: { op: 'filter', expr: 'item.ts > now()-3600', view: 'list' }, status: 'ok' });

    // flow C: branching
    const c1 = createNode('script', 0,   280, { title: 'user events', config: { lang: 'js', code: '' }, status: 'ok' });
    const c2 = createNode('lens',   160, 280, { title: 'tag by cohort', config: { op: 'tag', expr: 'item.plan', view: 'table' }, status: 'ok' });
    const c3 = createNode('lens',   320, 240, { title: 'active users', config: { op: 'filter', expr: 'item.active', view: 'list' }, status: 'ok' });
    const c4 = createNode('lens',   320, 320, { title: 'churned users', config: { op: 'filter', expr: '!item.active', view: 'list' }, status: 'warn' });

    // flow D: camera feed → motion-detection script → tagged frames lens
    const d1 = createNode('camera', 0,   420, { title: 'front door cam', config: { source: 'rtsp', resolution: '1280x720', fps: 15, mode: 'motion', trigger: 'on-motion' }, status: 'run' });
    const d2 = createNode('script', 160, 420, { title: 'detect & crop', config: { lang: 'python', code: '# yolov8 inference\nframes = inputs[0]\nreturn [crop(f, box) for f, box in detect(frames)]' }, status: 'ok' });
    const d3 = createNode('lens',   320, 420, { title: 'recent visitors', config: { op: 'tag', expr: 'frame.confidence > 0.7', view: 'cards' }, status: 'ok' });

    tryConnect(a1.id, a2.id);
    tryConnect(a2.id, a3.id);
    tryConnect(a3.id, a4.id);
    tryConnect(b1.id, b2.id);
    tryConnect(b2.id, a3.id);  // B joins A — demonstrates overlap
    tryConnect(c1.id, c2.id);
    tryConnect(c2.id, c3.id);
    tryConnect(c2.id, c4.id);
    tryConnect(d1.id, d2.id);
    tryConnect(d2.id, d3.id);

    applyTransform();
    renderEdges();
  }

  seed();
  applyTransform();
  updateStackCues();

  // wire up toolbar buttons
  document.getElementById('auto-layout-btn').addEventListener('click', toggleAutoLayout);
  for (let i = 0; i < 3; i++) {
    document.getElementById(`view-dot-${i}`).addEventListener('click', () => switchToView(i));
  }

  // seed view-spec 0 from the initial graph state
  state.viewSpecs[0] = captureViewSpec();
  updateViewUI();

  // re-render edges on resize
  window.addEventListener('resize', renderEdges);

})();
</script>
</body>
</html>
